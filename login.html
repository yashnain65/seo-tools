<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - SEO Tools Hub</title>

<link rel="stylesheet" href="css/style.css">

<style>

.login-container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

.login-box button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.login-box p{
margin-top:15px;
font-size:14px;
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">SEO Tools Hub</div>

<nav class="nav-links">

<a href="index.html">Home</a>

</nav>

</header>

<div class="login-container">

<div class="login-box">

<h2>Login</h2>

<input type="email" placeholder="Enter email">

<input type="password" placeholder="Enter password">

<button>Login</button>

<p>Don't have an account? <a href="#">Sign up</a></p>

</div>

</div>

</body>

</html>
