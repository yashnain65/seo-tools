<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up - SEO Tools Hub</title>

<link rel="stylesheet" href="css/style.css">

<style>

.signup-container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.signup-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
width:340px;
text-align:center;
}

.signup-box h2{
margin-bottom:20px;
}

.signup-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

.signup-box button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.signup-box p{
margin-top:15px;
font-size:14px;
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">SEO Tools Hub</div>

<nav class="nav-links">

<a href="index.html">Home</a>

</nav>

</header>

<div class="signup-container">

<div class="signup-box">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<button>Sign Up</button>

<p>Already have an account? <a href="login.html">Login</a></p>

</div>

</div>

</body>

</html>
