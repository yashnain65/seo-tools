<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyword Research Tool</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
margin:0;
}

header{
background:#111;
color:white;
padding:15px;
}

.container{
margin-top:40px;
}

input{
padding:10px;
width:250px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
margin-left:10px;
}

ul{
list-style:none;
padding:0;
margin-top:30px;
}

li{
background:white;
margin:8px auto;
padding:10px;
width:300px;
border-radius:5px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<header>
<h1>Keyword Research Tool</h1>
</header>

<div class="container">

<input type="text" id="keyword" placeholder="Enter keyword">

<button onclick="generateKeywords()">Generate</button>

<ul id="result"></ul>

</div>

<script>

async function generateKeywords(){

let keyword = document.getElementById("keyword").value;

if(keyword === ""){
alert("Please enter a keyword");
return;
}

let url = "https://suggestqueries.google.com/complete/search?client=firefox&q=" + keyword;

let response = await fetch(url);

let data = await response.json();

let keywords = data[1];

let html = "";

keywords.forEach(k => {

html += `
<li>
<span>${k}</span>
<button onclick="copyKeyword('${k}')">Copy</button>
</li>
`;

});

document.getElementById("result").innerHTML = html;

}

function copyKeyword(text){

navigator.clipboard.writeText(text);

alert("Copied: " + text);

}

</script>
</body>

</html>
